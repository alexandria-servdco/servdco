# =============================================================================
# LEGACY — SUPERSEDED BY CLOUDFLARE WORKERS CRON (cloudflare-worker/).
# =============================================================================
# Sub-hourly reconciliation now runs on Cloudflare Workers Cron. This workflow
# is retained ONLY as a manual rollback fallback: the automatic schedule is
# disabled so it no longer runs on its own. To re-enable as an emergency
# fallback, uncomment the `schedule` block below.
#
# Once Cloudflare is verified in production for 48h, this file may be deleted.
# =============================================================================
name: Payment Reconciliation Cron (LEGACY)

on:
  # schedule:
  #   - cron: "*/15 * * * *"   # disabled — migrated to Cloudflare Workers Cron
  workflow_dispatch:

concurrency:
  group: reconcile-cron
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Payment reconcile batch
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::notice::Set SITE_URL and CRON_SECRET in GitHub repo secrets to enable 15-minute reconciliation."
            exit 0
          fi
          curl -fsS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL%/}/api/stripe/payments/reconcile-batch"

      - name: Subscription reconcile batch
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            exit 0
          fi
          curl -fsS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL%/}/api/stripe/subscription/reconcile-batch"
