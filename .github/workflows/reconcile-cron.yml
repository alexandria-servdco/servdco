# Hobby-plan cron schedules run at most once per day on Vercel.
# Sub-hourly payment/subscription reconciliation runs via GitHub Actions instead.
name: Payment Reconciliation Cron

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: reconcile-cron
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Payment reconcile batch
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::notice::Set SITE_URL and CRON_SECRET in GitHub repo secrets to enable 15-minute reconciliation."
            exit 0
          fi
          curl -fsS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL%/}/api/stripe/payments/reconcile-batch"

      - name: Subscription reconcile batch
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            exit 0
          fi
          curl -fsS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL%/}/api/stripe/subscription/reconcile-batch"
