name = "servdco-prod"
main = "src/worker.ts"
compatibility_date = "2024-11-01"

# ---------------------------------------------------------------------------
# ServdCo Cron Worker — pure scheduler.
#
# No build step, no KV/Durable Objects/Queues/D1/R2. Deployed with the Wrangler
# CLI (`npm run deploy`). All reconciliation logic stays on Vercel; this Worker
# only makes authenticated HTTP calls on a schedule.
# ---------------------------------------------------------------------------

# Scheduled triggers (UTC). Every 15 minutes. This is the only place the
# cadence is defined.
[triggers]
crons = ["*/15 * * * *"]

# Non-secret variables. SITE_URL must be set in the Cloudflare dashboard
# (Settings -> Variables) — do not commit deployment URLs to this file.
# CRON_SECRET and ALERT_WEBHOOK_URL are SECRETS — never put them here; set them
# with `npx wrangler secret put <NAME>` (see docs).
[vars]
WORKER_VERSION = "2.0.0"

# Keep runtime logs available for `wrangler tail` and the dashboard Logs tab.
[observability]
enabled = true
