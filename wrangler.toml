# Cron Worker config when Cloudflare Workers Builds uses the repository root.
# Canonical config for local CLI deploys: cloudflare-worker/wrangler.toml
name = "servdco-prod"
main = "cloudflare-worker/src/worker.ts"
compatibility_date = "2024-11-01"

[triggers]
crons = ["*/15 * * * *"]

[vars]
WORKER_VERSION = "2.0.0"
# SITE_URL — set in Cloudflare dashboard (Settings → Variables). Do not commit deployment URLs.
# CRON_SECRET — set via `wrangler secret put CRON_SECRET` (must match Vercel CRON_SECRET).

[observability]
enabled = true
